name: XcoderApp
options:
  bundleIdPrefix: com.xcoder
targets:
  XcoderApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [Sources]
    settings:
      CODE_SIGN_IDENTITY: "Apple Development"
      DEVELOPMENT_TEAM: "YOUR_TEAM_ID" # <--- Replace with your Apple Team ID
