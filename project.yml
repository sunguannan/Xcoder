name: XcoderApp
options:
  bundleIdPrefix: com.xcoder
targets:
  XcoderApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    # Include Resources for AppIcon and Info.plist
    sources: [Sources, Resources] 
    settings:
      DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
      # Enable Apple Generic Versioning for fastlane increment_build_number
      VERSIONING_SYSTEM: "apple-generic"
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0.0"
      # Use pre-configured Info.plist for TestFlight compliance
      INFOPLIST_FILE: Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
